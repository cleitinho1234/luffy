<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy: Sprite Battle</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; z-index: 10; pointer-events: none; border: 2px solid #ffeb3b; }
        .hud { position: fixed; top: 10px; right: 10px; width: 250px; text-align: right; }
        .hp-bar { width: 100%; height: 15px; background: #333; border: 2px solid white; margin: 5px 0; overflow: hidden; }
        .hp-fill { height: 100%; background: #4CAF50; transition: width 0.1s; }
        .label { font-size: 14px; color: white; font-weight: bold; text-shadow: 2px 2px black; }
        #carregando { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; z-index: 100; }
    </style>
</head>
<body>

<div id="carregando">Carregando Sprites...<br>(Aguarde os links das imagens)</div>

<div id="ui">
    <b>W A S D</b>: Mover | <b>F, R</b>: Ataques<br>
    <b>1</b>: G2 | <b>2</b>: <b>G5 (Em breve)</b>
</div>

<div class="hud">
    <div class="label">LUFFY</div>
    <div class="hp-bar"><div id="p-hp" class="hp-fill" style="width: 100%;"></div></div>
    <div class="label" style="color: #f44336;">MARINHEIRO</div>
    <div class="hp-bar"><div id="e-hp" class="hp-fill" style="width: 100%; background: #f44336;"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÃO DE IMAGENS (SPRITES) ---

// 1. Crie os objetos de imagem
const imgLuffy = new Image();
const imgEnemy = new Image();

// 2. DEFINE OS LINKS (Substitua aqui pelos links reais .png)
// Como eu não tenho o link do Luffy, usei um sprite temporário de teste
imgLuffy.src = "https://i.imgur.com/8N69D6S.png"; // <-- MUDE AQUI PARA O LINK DO LUFFY
imgEnemy.src = "https://i.imgur.com/XU6sXNl.png"; // Link temporário do inimigo

let imagesLoaded = 0;
function imageLoaded() {
    imagesLoaded++;
    if (imagesLoaded === 2) {
        document.getElementById("carregando").style.display = "none";
        loop(); // Só começa o jogo quando as imagens carregarem
    }
}
imgLuffy.onload = imageLoaded;
imgEnemy.onload = imageLoaded;

// Configurações do Jogo
const gravity = 0.8;
const groundHeight = 60;
const keys = {};
let shake = 0;

// Configuração da Animação do Luffy (Sprite Sheet)
// Eu preciso saber o tamanho de cada "quadradinho" da sua imagem.
// Usei valores genéricos aqui (64x64px).
const luffySpriteInfo = {
    sw: 64, // Largura de cada frame na imagem original
    sh: 64, // Altura de cada frame na imagem original
    dw: 100, // Largura que vai aparecer na tela (esticado)
    dh: 100, // Altura que vai aparecer na tela
    states: {
        idle: { row: 0, frames: 4, speed: 10 }, // Linha 0 da imagem, 4 desenhos, velocidade
        run:  { row: 1, frames: 6, speed: 5 },  // Linha 1 da imagem...
        punch:{ row: 2, frames: 3, speed: 5 }
    }
};

const player = {
    x: 150, y: 0, vx: 0, vy: 0, hp: 100,
    speed: 7, jumping: false, attacking: false, timer: 0,
    state: 'idle', frame: 0, animTimer: 0,
    
    draw() {
        ctx.save();
        if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.8; }
        
        // --- LÓGICA DE ANIMAÇÃO ---
        this.animTimer++;
        const sInfo = luffySpriteInfo;
        const state = sInfo.states[this.state];
        
        if (this.animTimer > state.speed) {
            this.frame = (this.frame + 1) % state.frames;
            this.animTimer = 0;
            // Se acabar a animação de soco, volta pro idle
            if(this.state === 'punch' && this.frame === state.frames - 1) {
                this.attacking = false;
                this.state = 'idle';
            }
        }

        // --- DESENHAR A IMAGEM NA TELA ---
        // ctx.drawImage(imagem, sx, sy, sw, sh, dx, dy, dw, dh)
        ctx.drawImage(
            imgLuffy,
            this.frame * sInfo.sw, // Corta a imagem na horizontal (frame)
            state.row * sInfo.sh,  // Corta a imagem na vertical (linha do estado)
            sInfo.sw, sInfo.sh,    // Tamanho do corte
            this.x - 30, this.y - 15, // Posição na tela
            sInfo.dw, sInfo.dh     // Tamanho na tela
        );
        ctx.restore();
    },

    update() {
        // Define o estado de animação
        if (this.attacking) this.state = 'punch';
        else if (this.jumping) this.state = 'idle'; // Pode mudar pra um frame de pulo
        else if (Math.abs(this.vx) > 0.1) this.state = 'run';
        else this.state = 'idle';

        if (keys['a'] || keys['A']) this.vx = -this.speed;
        else if (keys['d'] || keys['D']) this.vx = this.speed;
        else this.vx = 0;

        if ((keys['w'] || keys['W']) && !this.jumping) { this.vy = -18; this.jumping = true; }
        
        this.x += this.vx; this.y += this.vy;
        if (this.y + 85 < canvas.height - groundHeight) this.vy += gravity;
        else { this.vy = 0; this.y = canvas.height - groundHeight - 85; this.jumping = false; }

        if (this.attacking) {
            // Lógica simples de dano (precisa ajustar com o frame do soco)
            if (this.frame === 2 && Math.abs(this.x - enemy.x) < 80) {
                enemy.takeDamage(10); shake = 5;
            }
        }
        document.getElementById("p-hp").style.width = this.hp + "%";
    }
};

const enemy = {
    x: canvas.width - 300, y: 0, w: 45, h: 80, vx: 0, vy: 0,
    hp: 100, speed: 3, attacking: false, timer: 0, hitback: 0,

    draw() {
        ctx.save();
        if (this.hitback > 0) { ctx.translate(this.hitback, 0); ctx.globalAlpha = 0.6; this.hitback *= 0.8; }
        // Desenha o inimigo (Sprite genérico)
        ctx.drawImage(imgEnemy, 0, 0, 64, 64, this.x, this.y-10, 80, 100);
        ctx.restore();
    },

    update() {
        if (this.hp <= 0) { this.x = -500; setTimeout(() => {this.hp=100; this.x=canvas.width-100;}, 3000); return; }
        
        let dist = player.x - this.x;
        if (Math.abs(dist) > 60) this.x += dist > 0 ? this.speed : -this.speed;
        else if (!this.attacking && Math.random() > 0.98) { this.attacking = true; this.timer = 0; }

        if (this.attacking) {
            this.timer++;
            if (this.timer === 10 && Math.abs(player.x - this.x) < 70) { player.hp -= 4; shake = 10; }
            if (this.timer > 20) this.attacking = false;
        }

        if (this.y + 85 < canvas.height - groundHeight) this.vy += gravity;
        else { this.vy = 0; this.y = canvas.height - groundHeight - 85; }
        this.y += this.vy;
        document.getElementById("e-hp").style.width = this.hp + "%";
    },

    takeDamage(dmg) {
        this.hp -= dmg;
        this.hitback = player.x < this.x ? 20 : -20;
    }
};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (player.attacking) return;
    if (e.key.toLowerCase() === 'f') { player.attacking = true; player.timer = 0; player.frame = 0; }
});
window.addEventListener("keyup", (e) => keys[e.key] = false);

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#388E3C"; ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
    
    player.update(); player.draw();
    enemy.update(); enemy.draw();
    
    requestAnimationFrame(loop);
}
// O loop só começa dentro da função imageLoaded()
</script>
</body>
</html>
