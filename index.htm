<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy Gear 5: Impacto Nika</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; pointer-events: none; border: 2px solid #ffeb3b; }
        b { color: #ffeb3b; }
    </style>
</head>
<body>

<div id="ui">
    <div class="controles-info">
        <b>W A S D</b>: Mover | <b>F, R, E</b>: Golpes<br>
        <b>Q</b>: <b style="color:white">PISOTÃO GIGANTE (GEAR 5)</b><br>
        <b>1</b>: G2 | <b>2</b>: <b>GEAR 5</b>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.8;
const groundHeight = 60;
const keys = {};
let shake = 0;

const player = {
    x: 150, y: 0, w: 40, h: 60,
    vx: 0, vy: 0, speed: 7,
    jumping: false, attacking: false, attackType: '',
    timer: 0, gear2: false, gear5: false,
    transforming: false, transformTimer: 0,
    groundEffect: { active: false, x: 0, timer: 0 },
    particles: [],

    draw() {
        ctx.save();
        // Efeito de Tremor de Tela
        if (shake > 0) {
            ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
            shake *= 0.9;
        }

        const px = this.x;
        const py = this.y;
        
        let skin = this.gear5 ? "#ffffff" : (this.gear2 ? "#ff8a80" : "#f5c1a4");
        let shirt = this.gear5 ? "#ffffff" : (this.gear2 ? "#b71c1c" : "#d32f2f");
        let shorts = this.gear5 ? "#ffffff" : "#283593";

        // --- CORPO ---
        if (this.transforming) {
            ctx.translate(px + 20, py + 40);
            ctx.rotate(Math.PI / 2);
            ctx.translate(Math.random()*3, Math.random()*3);
            ctx.translate(-(px + 20), -(py + 40));
        }

        // Pernas/Pé Gigante
        ctx.fillStyle = shorts;
        if (this.attacking && this.attackType === 'stomp') {
            // Pé subindo e descendo
            let legH = this.timer < 10 ? this.timer * 20 : (20 - this.timer) * 10;
            ctx.fillRect(px + 10, py + 60 - legH, 35, 40 + legH); 
            ctx.fillStyle = skin;
            ctx.fillRect(px + 5, py + 100 - legH, 50, 30); // Pé gigante
        } else {
            ctx.fillRect(px + 5, py + 60, 12, 25); 
            ctx.fillRect(px + 23, py + 60, 12, 25);
        }

        // Tronco e Cabeça
        ctx.fillStyle = shirt; ctx.fillRect(px, py + 20, 40, 40);
        ctx.fillStyle = skin; ctx.fillRect(px + 5, py - 15, 30, 35);
        
        if (this.gear5) {
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.beginPath();
            ctx.arc(px + 5, py - 18, 12, 0, Math.PI*2);
            ctx.arc(px + 20, py - 25, 18, 0, Math.PI*2);
            ctx.arc(px + 35, py - 18, 12, 0, Math.PI*2);
            ctx.fill();
            this.drawLightning();
        } else {
            ctx.fillStyle = "#fbc02d"; ctx.fillRect(px - 5, py - 15, 50, 8);
            ctx.fillStyle = "#d32f2f"; ctx.fillRect(px + 5, py - 20, 30, 5);
        }

        // Soco comum
        if (this.attacking && this.attackType !== 'stomp') {
            ctx.fillStyle = skin;
            let reach = this.timer * 30;
            ctx.fillRect(px + 30, py + 30, reach, 15);
            ctx.fillStyle = "#000"; ctx.fillRect(px + 30 + reach, py + 20, 30, 35);
        }

        ctx.restore();
        this.drawGroundEffects();
    },

    drawLightning() {
        ctx.strokeStyle = "black"; ctx.lineWidth = 2;
        for(let i=0; i<2; i++) {
            ctx.beginPath();
            let rx = this.x + Math.random()*80 - 20;
            let ry = this.y + Math.random()*80 - 20;
            ctx.moveTo(rx, ry); ctx.lineTo(rx + 5, ry + 10); ctx.lineTo(rx - 3, ry + 15); ctx.stroke();
        }
    },

    drawGroundEffects() {
        // Buraco temporário
        if (this.groundEffect.active) {
            ctx.fillStyle = "#111"; // Cor do fundo (buraco)
            ctx.beginPath();
            ctx.ellipse(this.groundEffect.x + 25, canvas.height - groundHeight, 60, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            this.groundEffect.timer++;
            if (this.groundEffect.timer > 40) this.groundEffect.active = false;
        }
        // Partículas de terra voando
        this.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.5;
            ctx.fillStyle = "#5d4037";
            ctx.fillRect(p.x, p.y, p.s, p.s);
            if (p.y > canvas.height) this.particles.splice(i, 1);
        });
    },

    update() {
        if (this.transforming) {
            this.transformTimer++;
            if (this.transformTimer > 60) { this.transforming = false; this.gear5 = true; this.speed = 15; }
            return;
        }

        if (keys['a'] || keys['A']) this.vx = -this.speed;
        else if (keys['d'] || keys['D']) this.vx = this.speed;
        else this.vx = 0;

        if ((keys['w'] || keys['W']) && !this.jumping) { this.vy = this.gear5 ? -22 : -17; this.jumping = true; }

        this.x += this.vx; this.y += this.vy;

        if (this.y + this.h + 25 < canvas.height - groundHeight) {
            this.vy += gravity;
        } else {
            this.vy = 0; this.y = canvas.height - groundHeight - this.h - 25;
            this.jumping = false;
        }

        if (this.attacking) {
            this.timer++;
            // Momento do Impacto do Stomp
            if (this.attackType === 'stomp' && this.timer === 10) {
                shake = 20;
                this.groundEffect = { active: true, x: this.x, timer: 0 };
                for(let i=0; i<15; i++) {
                    this.particles.push({
                        x: this.x + 20, y: canvas.height - groundHeight,
                        vx: Math.random() * 10 - 5, vy: -Math.random() * 15,
                        s: Math.random() * 8 + 4
                    });
                }
            }
            if (this.timer > 20) { this.attacking = false; this.timer = 0; }
        }
    },

    attack(type) {
        if (!this.attacking && !this.transforming) {
            if (type === 'stomp' && !this.gear5) return; // Só faz stomp no G5
            this.attackType = type; this.attacking = true; this.timer = 0;
        }
    }
};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (e.key === 'f' || e.key === 'F') player.attack('pistol');
    if (e.key === 'q' || e.key === 'Q') player.attack('stomp');
    if (e.key === '1') { player.gear2 = !player.gear2; player.gear5 = false; player.speed = player.gear2 ? 12 : 7; }
    if (e.key === '2') { if(!player.gear5) { player.transforming = true; player.transformTimer = 0; } else { player.gear5 = false; player.speed = 7; } }
});
window.addEventListener("keyup", (e) => { keys[e.key] = false; });

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
    player.update(); player.draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
