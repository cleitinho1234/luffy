<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Câmera Automática</title>

<style>
body {
  margin: 0;
  background-color: #1e1e1e;
  color: white;
  font-family: Arial;
  text-align: center;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#aviso {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000e0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: green;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="aviso">
  <h2>Uso de câmera</h2>
  <p>Este site pode capturar imagens.</p>
  <button id="btn">Continuar</button>
</div>

<video id="video" autoplay playsinline></video>

<script>
const video = document.getElementById('video');
const btn = document.getElementById('btn');

// botão funcionando de verdade
btn.addEventListener("click", iniciar);

async function iniciar() {
  document.getElementById("aviso").style.display = "none";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    // ESPERA o vídeo carregar antes de tirar foto
    video.onloadedmetadata = () => {
      video.play();
      setTimeout(capturarFotos, 2000);
    };

  } catch (err) {
    alert("Erro ao acessar câmera: " + err.message);
  }
}

function capturarFotos() {
  let count = 0;

  const intervalo = setInterval(() => {
    if (count >= 4) {
      clearInterval(intervalo);
      return;
    }

    capturar();
    count++;

  }, 1500);
}

function capturar() {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const data = canvas.toDataURL("image/png");

  console.log("foto capturada", data);

  // TESTE: mostra na tela pra você ver que funcionou
  const img = document.createElement("img");
  img.src = data;
  img.style.width = "80px";
  document.body.appendChild(img);
}
</script>

</body>
</html>
