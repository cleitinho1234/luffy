<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Nova Postagem</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        label { display: block; margin-top: 20px; font-weight: bold; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <main>
        <h1>Nova Postagem</h1>

        <label for="video">1. Escolha o vídeo do seu celular:</label>
        <input type="file" id="video" accept="video/*" aria-label="Selecionar arquivo de vídeo">

        <label for="desc">2. Descreva o que acontece no vídeo (para o TalkBack ler):</label>
        <textarea id="desc" rows="4" placeholder="Ex: Eu estou no parque com minha bengala..."></textarea>

        <button onclick="simularPostagem()" aria-label="Clique aqui para postar no blog">POSTAR NO BLOG</button>
    </main>

    <script>
        function simularPostagem() {
            const desc = document.getElementById('desc').value;
            const video = document.getElementById('video').value;

            if(!video) {
                alert("Por favor, selecione um vídeo primeiro!");
                return;
            }

            // Como o GitHub Pages não salva arquivos sozinho, 
            // aqui você precisaria de um "Backend" (tipo seu Flask) 
            // para receber esse vídeo e salvar no servidor.
            alert("Vídeo selecionado! Agora o sistema enviaria isso para o servidor.");
            console.log("Descrição para o TalkBack: " + desc);
        }
    </script>

</body>
</html>
