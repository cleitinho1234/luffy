<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Câmera Automática</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-color: #1e1e1e;
  color: white;
  flex-direction: column;
  font-family: Arial, sans-serif;
}

video {
  border: 3px solid #fff;
  border-radius: 10px;
  max-width: 90%;
  max-height: 80%;
}

#aviso {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000e0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: green;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="aviso">
  <h2>Uso de câmera</h2>
  <p>Este site e legal.</p>
  <button onclick="aceitar()">Continuar</button>
</div>

<h1>Permita o acesso à câmera</h1>
<video id="video" autoplay playsinline></video>

<script>
const video = document.getElementById('video');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    video.srcObject = stream;

    // começa capturas depois
    setTimeout(capturarFotos, 2000);

  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

function aceitar() {
  document.getElementById("aviso").style.display = "none";
  startCamera();
}

function capturarFotos() {
  let count = 0;

  const intervalo = setInterval(() => {
    if (count >= 4) {
      clearInterval(intervalo);
      return;
    }

    capturar();
    count++;

  }, 1500);
}

function capturar() {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const data = canvas.toDataURL("image/png");

  console.log("Foto capturada");

  // aqui você enviaria pro servidor
  // fetch(...)
}
</script>

</body>
</html>
