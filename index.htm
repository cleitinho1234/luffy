<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy: Awakening Nika</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; pointer-events: none; border: 2px solid #ffeb3b; }
        b { color: #ffeb3b; }
    </style>
</head>
<body>

<div id="ui">
    <div class="controles-info">
        <b>W A S D</b>: Mover | <b>F, R, E</b>: Ataques<br>
        <b>1</b>: Gear 2 | <b>2</b>: <b>GEAR 5 (TRANSFORMAR)</b>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.8;
const groundHeight = 60;
const keys = {};

const player = {
    x: 100, y: 0, w: 40, h: 60,
    vx: 0, vy: 0, speed: 7,
    jumping: false, attacking: false, attackType: '',
    timer: 0, gear2: false, gear5: false,
    transforming: false, transformTimer: 0,

    draw() {
        const px = this.x;
        const py = this.y;
        
        let skin = "#f5c1a4";
        let shirt = "#d32f2f";
        let shorts = "#283593";
        let hair = "#000";

        if (this.gear2) { skin = "#ff8a80"; shirt = "#b71c1c"; this.drawSmoke(); }
        if (this.gear5) { skin = "#ffffff"; shirt = "#ffffff"; shorts = "#ffffff"; hair = "#ffffff"; }

        ctx.save();

        // --- ANIMAÇÃO DE TRANSFORMAÇÃO (DEITAR E RIR) ---
        if (this.transforming) {
            ctx.translate(px + 20, py + 40);
            ctx.rotate(Math.PI / 2); // Deita o personagem
            // Efeito de tremer (rindo)
            ctx.translate(Math.random() * 5, Math.random() * 5);
            ctx.translate(-(px + 20), -(py + 40));
            // Balão de risada "Hahaha"
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.fillText("JOY BOY...", px + 50, py);
        }

        // Pernas
        ctx.fillStyle = shorts;
        ctx.fillRect(px + 5, py + 60, 12, 25); 
        ctx.fillRect(px + 23, py + 60, 12, 25);

        // Tronco
        ctx.fillStyle = shirt;
        ctx.fillRect(px, py + 20, 40, 40);

        // Cabeça
        ctx.fillStyle = skin;
        ctx.fillRect(px + 5, py - 15, 30, 35);
        
        // Cabelo e Chapéu
        if (this.gear5) {
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.beginPath();
            ctx.arc(px + 5, py - 18, 12, 0, Math.PI*2);
            ctx.arc(px + 20, py - 25, 18, 0, Math.PI*2);
            ctx.arc(px + 35, py - 18, 12, 0, Math.PI*2);
            ctx.fill();
            this.drawLightning(); // Raios do Gear 5
        } else {
            ctx.fillStyle = "#fbc02d";
            ctx.fillRect(px - 5, py - 15, 50, 8);
            ctx.fillStyle = "#d32f2f";
            ctx.fillRect(px + 5, py - 20, 30, 5);
        }

        // Ataques
        if (this.attacking && !this.transforming) {
            ctx.fillStyle = this.gear5 ? "#fff" : skin;
            let reach = this.timer * (this.gear5 ? 40 : 25);
            ctx.fillRect(px + 30, py + 30, reach, this.gear5 ? 20 : 12);
            ctx.fillStyle = "#000";
            ctx.fillRect(px + 30 + reach, py + 20, 30, 35);
        }

        ctx.restore();
    },

    drawSmoke() {
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.beginPath();
        ctx.arc(this.x + Math.random()*40, this.y + 40 - (this.timer*2), 5, 0, Math.PI*2);
        ctx.fill();
    },

    drawLightning() {
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        for(let i=0; i<3; i++) {
            ctx.beginPath();
            let rx = this.x + Math.random()*100 - 30;
            let ry = this.y + Math.random()*100 - 30;
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + 10, ry + 10);
            ctx.lineTo(rx - 5, ry + 20);
            ctx.stroke();
        }
    },

    update() {
        if (this.transforming) {
            this.transformTimer++;
            if (this.transformTimer > 60) { // 1 segundo de animação
                this.transforming = false;
                this.gear5 = true;
                this.speed = 16;
            }
            return; // Bloqueia movimento enquanto transforma
        }

        if (keys['a'] || keys['A']) this.vx = -this.speed;
        else if (keys['d'] || keys['D']) this.vx = this.speed;
        else this.vx = 0;

        if ((keys['w'] || keys['W']) && !this.jumping) {
            this.vy = this.gear5 ? -22 : -17;
            this.jumping = true;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h + 25 < canvas.height - groundHeight) {
            this.vy += gravity;
        } else {
            this.vy = 0;
            this.y = canvas.height - groundHeight - this.h - 25;
            this.jumping = false;
        }

        if (this.attacking) {
            this.timer++;
            if (this.timer > 12) { this.attacking = false; this.timer = 0; }
        }
    },

    startGear5() {
        if (!this.gear5 && !this.transforming) {
            this.transforming = true;
            this.transformTimer = 0;
            this.gear2 = false;
        } else {
            this.gear5 = false;
            this.speed = 7;
        }
    }
};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (e.key === 'f' || e.key === 'F') player.attack('pistol');
    if (e.key === '1') { player.gear2 = !player.gear2; player.gear5 = false; player.speed = player.gear2 ? 12 : 7; }
    if (e.key === '2') player.startGear5();
});
window.addEventListener("keyup", (e) => { keys[e.key] = false; });

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Chão
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
    player.update();
    player.draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
