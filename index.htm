<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy Nika vs Marinha</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; pointer-events: none; border: 2px solid #ffeb3b; z-index: 10; }
        .hud { position: fixed; top: 10px; right: 10px; width: 200px; }
        .hp-bar { width: 100%; height: 20px; background: #555; border: 2px solid white; margin-bottom: 5px; position: relative; }
        .hp-fill { height: 100%; background: #4CAF50; transition: width 0.2s; }
        .label { font-size: 12px; color: white; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui">
    <b>W A S D</b>: Mover | <b>F, Q</b>: Ataques<br>
    <b>1</b>: Gear 2 | <b>2</b>: <b>Gear 5</b>
</div>

<div class="hud">
    <div class="label">Luffy (Você)</div>
    <div class="hp-bar"><div id="playerHp" class="hp-fill" style="width: 100%;"></div></div>
    <div class="label">Marinheiro (Inimigo)</div>
    <div class="hp-bar"><div id="enemyHp" class="hp-fill" style="width: 100%; background: #f44336;"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.8;
const groundHeight = 60;
const keys = {};
let shake = 0;

// Configurações do Jogador
const player = {
    x: 100, y: 0, w: 40, h: 60,
    vx: 0, vy: 0, speed: 7, hp: 100,
    jumping: false, attacking: false, attackType: '',
    timer: 0, gear2: false, gear5: false, transforming: false, transformTimer: 0,
    hit: false,

    draw() {
        ctx.save();
        if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.8; }
        
        const px = this.x; const py = this.y;
        let skin = this.gear5 ? "#fff" : (this.gear2 ? "#ff8a80" : "#f5c1a4");
        let shirt = this.gear5 ? "#fff" : (this.gear2 ? "#b71c1c" : "#d32f2f");
        
        if (this.transforming) ctx.translate(Math.random()*5, Math.random()*5);

        // Desenho básico Luffy
        ctx.lineWidth = this.gear5 ? 3 : 1;
        ctx.strokeStyle = this.gear5 ? "#000" : "transparent";

        // Pernas
        ctx.fillStyle = this.gear5 ? "#fff" : "#283593";
        ctx.fillRect(px+5, py+60, 12, 25); ctx.fillRect(px+23, py+60, 12, 25);
        if(this.gear5) { ctx.strokeRect(px+5, py+60, 12, 25); ctx.strokeRect(px+23, py+60, 12, 25); }

        // Tronco e Cabeça
        ctx.fillStyle = shirt; ctx.fillRect(px, py+20, 40, 40);
        if(this.gear5) ctx.strokeRect(px, py+20, 40, 40);
        ctx.fillStyle = skin; ctx.fillRect(px+5, py-15, 30, 35);
        if(this.gear5) ctx.strokeRect(px+5, py-15, 30, 35);

        // Ataque Pistol
        if (this.attacking && this.attackType === 'pistol') {
            let reach = this.timer * 30;
            ctx.fillStyle = skin;
            ctx.fillRect(px+35, py+30, reach, 15);
            if(this.gear5) ctx.strokeRect(px+35, py+30, reach, 15);
            ctx.fillStyle = "#000"; ctx.fillRect(px+35+reach, py+20, 30, 35);
        }
        ctx.restore();
    },

    update() {
        if(this.transforming){ 
            this.transformTimer++; 
            if(this.transformTimer > 50){ this.transforming=false; this.gear5=true; this.speed=14; }
            return;
        }
        
        if (keys['a'] || keys['A']) this.vx = -this.speed;
        else if (keys['d'] || keys['D']) this.vx = this.speed;
        else this.vx = 0;

        if ((keys['w'] || keys['W']) && !this.jumping) { this.vy = -17; this.jumping = true; }
        
        this.x += this.vx; this.y += this.vy;
        if (this.y + 85 < canvas.height - groundHeight) this.vy += gravity;
        else { this.vy = 0; this.y = canvas.height - groundHeight - 85; this.jumping = false; }

        if (this.attacking) {
            this.timer++;
            // Lógica de Dano no Inimigo
            let reach = this.timer * 30;
            if (this.x + reach + 40 > enemy.x && this.x < enemy.x + enemy.w && Math.abs(this.y - enemy.y) < 50) {
                enemy.takeDamage(this.gear5 ? 2 : 1);
            }
            if (this.timer > 15) { this.attacking = false; this.timer = 0; }
        }
        document.getElementById("playerHp").style.width = this.hp + "%";
    }
};

// Configurações do Inimigo (Marinheiro)
const enemy = {
    x: canvas.width - 200, y: 0, w: 45, h: 70, vx: 0, vy: 0,
    hp: 100, speed: 3, attacking: false, timer: 0,
    hitback: 0,

    draw() {
        ctx.save();
        if (this.hitback > 0) { ctx.globalAlpha = 0.5; ctx.translate(this.hitback, 0); }
        
        // Desenho Marinheiro
        ctx.fillStyle = "white"; ctx.fillRect(this.x, this.y+20, 45, 45); // Camisa
        ctx.fillStyle = "#1a237e"; ctx.fillRect(this.x, this.y+65, 45, 20); // Calça
        ctx.fillStyle = "#f5c1a4"; ctx.fillRect(this.x+7, this.y-10, 30, 30); // Rosto
        ctx.fillStyle = "white"; ctx.fillRect(this.x+2, this.y-15, 40, 10); // Quepe

        if (this.attacking) {
            ctx.fillStyle = "#f5c1a4";
            ctx.fillRect(this.x - 30, this.y + 30, 35, 15); // Soco do inimigo
        }
        ctx.restore();
    },

    update() {
        if (this.hp <= 0) { this.x = -500; setTimeout(() => {this.hp=100; this.x=canvas.width;}, 3000); return; }

        // IA Simples: Seguir o jogador
        let diff = player.x - this.x;
        if (Math.abs(diff) > 50) {
            this.x += diff > 0 ? this.speed : -this.speed;
        } else {
            // Atacar se estiver perto
            if (Math.random() > 0.95 && !this.attacking) {
                this.attacking = true;
                this.timer = 0;
            }
        }

        if (this.attacking) {
            this.timer++;
            if (this.timer === 10 && Math.abs(player.x - this.x) < 60) {
                player.hp -= 5;
                shake = 10;
            }
            if (this.timer > 20) { this.attacking = false; }
        }

        if (this.hitback > 0) this.hitback -= 1;

        if (this.y + 85 < canvas.height - groundHeight) this.vy += gravity;
        else { this.vy = 0; this.y = canvas.height - groundHeight - 85; }
        this.y += this.vy;

        document.getElementById("enemyHp").style.width = this.hp + "%";
    },

    takeDamage(dmg) {
        this.hp -= dmg;
        this.hitback = player.x < this.x ? 15 : -15; // Afastadinha
    }
};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if ((e.key === 'f' || e.key === 'F') && !player.attacking) { player.attacking = true; player.attackType = 'pistol'; player.timer = 0; }
    if (e.key === '2') { player.transforming = true; player.transformTimer = 0; }
});
window.addEventListener("keyup", (e) => keys[e.key] = false);

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#388E3C"; ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
    
    player.update(); player.draw();
    enemy.update(); enemy.draw();
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
