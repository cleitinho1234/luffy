<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Canal do YouTube</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f9f9f9; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        iframe { border: none; border-radius: 8px; }
        .btn-youtube { display: inline-block; background: #ff0000; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bem-vindo ao meu site!</h1>
        <p>Confira o meu conteúdo mais recente do YouTube abaixo:</p>

        <!-- Script oficial do YouTube para botão de inscrição -->
        <script src="https://apis.google.com/js/platform.js"></script>
        <div class="g-ytsubscribe" data-channelid="COLOQUE_O_ID_DO_SEU_CANAL_AQUI" data-layout="full" data-count="default"></div>
        
        <br><br>

        <!-- Player do seu vídeo (Substitua o código final pelo do seu vídeo) -->
        <iframe width="560" height="315" src="https://www.youtube.com/embed/CODIGO_DO_SEU_VIDEO" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

        <br>
        <a href="https://youtube.com/seu_canal" target="_blank" class="btn-youtube">Ir para o YouTube para Curtir e Comentar</a>
    </div>

</body>
</html>
