<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site RGB</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Animação do Fundo RGB */
        @keyframes rgb-background {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animação de Texto Neon */
        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000; }
            33% { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00; }
            66% { text-shadow: 0 0 10px #0000ff, 0 0 20px #0000ff, 0 0 30px #0000ff; }
        }

        /* Animação da Borda do Card */
        @keyframes border-rgb {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 15px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        /* Corpo da página com o fundo animado */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff0055, #00ff66, #0066ff, #ffcc00);
            background-size: 400% 400%;
            animation: rgb-background 10vh infinite ease-in-out;
            overflow: hidden;
        }

        /* Container Principal (Card) */
        .container {
            background: rgba(15, 15, 15, 0.85);
            padding: 3rem;
            border-radius: 15px;
            border: 3px solid #ff0000;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: border-rgb 6s infinite linear;
            max-width: 500px;
            width: 90%;
        }

        /* Título Principal */
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            animation: neon-glow 6s infinite linear;
        }

        /* Subtítulo */
        p {
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Botão Estilo Gamer */
        .btn-rgb {
            display: inline-block;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            background: transparent;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Hover no Botão */
        .btn-rgb:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff, 0 0 40px #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SISTEMA INICIADO</h1>
        <p>Bem-vindo à primeira interface do seu novo projeto rodando direto do GitHub.</p>
        <a href="#" class="btn-rgb">ENTRAR NO FLUXO</a>
    </div>

</body>
</html>
