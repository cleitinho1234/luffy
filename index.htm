<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy: Pirate King</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; background: linear-gradient(#87CEEB, #E0F7FA); }
        
        #ui {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .controls-left, .controls-right { display: flex; gap: 15px; }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .btn-attack { background: #d32f2f; }
        .btn-jump { background: #1976D2; }
        .btn:active { transform: scale(0.9); background: #ffeb3b; color: #000; }

        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="stats">LUFFY - GEAR 1</div>
<canvas id="game"></canvas>

<div id="ui">
    <div class="controls-left">
        <div class="btn btn-jump" id="btnJump">PULAR</div>
    </div>
    <div class="controls-right">
        <div class="btn btn-attack" id="btnPistol">PISTOL</div>
        <div class="btn btn-attack" id="btnGatling" style="background: #e65100;">GATLING</div>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Configurações do Jogo
const gravity = 0.8;
const groundHeight = 80;

const player = {
    x: 50,
    y: canvas.height - 200,
    w: 50,
    h: 80,
    dy: 0,
    jumping: false,
    attacking: false,
    attackType: '',
    attackFrame: 0,
    color: "#FFC107", // Cor do chapéu/corpo por enquanto
    
    draw() {
        // Corpo (Luffy)
        ctx.fillStyle = "#f5c1a4"; // Pele
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        // Calção e Chapéu
        ctx.fillStyle = "#d32f2f"; // Vermelho
        ctx.fillRect(this.x, this.y, this.w, 20); // Camisa
        ctx.fillStyle = "#FFeb3b"; // Chapéu
        ctx.fillRect(this.x - 5, this.y, this.w + 10, 5);

        // Lógica de Ataques (Gomu Gomu no...)
        if (this.attacking) {
            ctx.fillStyle = "#f5c1a4";
            if (this.attackType === 'pistol') {
                // Braço esticando muito longe
                let reach = this.attackFrame * 20;
                ctx.fillRect(this.x + this.w, this.y + 30, reach, 15);
                ctx.fillStyle = "#000";
                ctx.fillRect(this.x + this.w + reach, this.y + 25, 20, 25); // Punho
            } 
            else if (this.attackType === 'gatling') {
                // Vários braços aleatórios
                for(let i=0; i<6; i++) {
                    let r = Math.random() * 150 + 50;
                    ctx.fillRect(this.x + this.w, this.y + (i*12), r, 8);
                }
            }
        }
    },

    update() {
        // Gravidade
        this.y += this.dy;
        if (this.y + this.h < canvas.height - groundHeight) {
            this.dy += gravity;
        } else {
            this.dy = 0;
            this.y = canvas.height - groundHeight - this.h;
            this.jumping = false;
        }

        // Animação de ataque
        if (this.attacking) {
            this.attackFrame++;
            if (this.attackFrame > 15) {
                this.attacking = false;
                this.attackFrame = 0;
            }
        }
    },

    jump() {
        if (!this.jumping) {
            this.dy = -18;
            this.jumping = true;
        }
    },

    attack(type) {
        if (!this.attacking) {
            this.attackType = type;
            this.attacking = true;
            this.attackFrame = 0;
        }
    }
};

// Loop do Jogo
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Chão
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

    player.update();
    player.draw();

    requestAnimationFrame(loop);
}

// Controles
document.getElementById("btnJump").addEventListener("touchstart", (e) => { e.preventDefault(); player.jump(); });
document.getElementById("btnPistol").addEventListener("touchstart", (e) => { e.preventDefault(); player.attack('pistol'); });
document.getElementById("btnGatling").addEventListener("touchstart", (e) => { e.preventDefault(); player.attack('gatling'); });

// Suporte para teclado no PC
window.addEventListener("keydown", (e) => {
    if (e.code === "Space") player.jump();
    if (e.key === "z") player.attack('pistol');
    if (e.key === "x") player.attack('gatling');
});

loop();
</script>

</body>
</html>
