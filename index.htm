<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy: Pirate King</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; background: rgba(0,0,0,0.7); color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .btn-attack { background: #d32f2f; }
        .btn-jump { background: #1976D2; }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
    <div class="btn btn-jump" onpointerdown="player.jump()">PULAR</div>
    <div class="btn btn-attack" onpointerdown="player.attack('pistol')">PISTOL</div>
    <div class="btn btn-attack" onpointerdown="player.attack('gatling')" style="background: #e65100;">GATLING</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.8;
const groundHeight = 60;

const player = {
    x: 80,
    y: 0,
    w: 40,
    h: 60,
    dy: 0,
    jumping: false,
    attacking: false,
    attackType: '',
    timer: 0,

    draw() {
        const px = this.x;
        const py = this.y;

        // --- DESENHANDO O CORPINHO DO LUFFY ---
        
        // Braço que fica parado (atrás)
        ctx.fillStyle = "#f5c1a4";
        ctx.fillRect(px - 10, py + 25, 10, 30);

        // Pernas
        ctx.fillStyle = "#283593"; // Short azul
        ctx.fillRect(px + 5, py + 60, 12, 25); // Perna 1
        ctx.fillRect(px + 23, py + 60, 12, 25); // Perna 2

        // Tronco (Camisa Vermelha)
        ctx.fillStyle = "#d32f2f";
        ctx.fillRect(px, py + 20, 40, 40);

        // Cabeça
        ctx.fillStyle = "#f5c1a4";
        ctx.fillRect(px + 5, py - 15, 30, 35);

        // Chapéu de Palha
        ctx.fillStyle = "#fbc02d";
        ctx.fillRect(px - 5, py - 15, 50, 8); // Aba
        ctx.fillStyle = "#d32f2f"; // Faixa vermelha
        ctx.fillRect(px + 5, py - 20, 30, 5);

        // --- LÓGICA DE ATAQUE (ESTICAR) ---
        if (this.attacking) {
            ctx.fillStyle = "#f5c1a4";
            if (this.attackType === 'pistol') {
                let socoX = (this.timer * 25); // O braço vai "crescendo"
                // Braço esticando
                ctx.fillRect(px + 30, py + 30, socoX, 12);
                // Punho no final do braço
                ctx.fillStyle = "#000";
                ctx.fillRect(px + 30 + socoX, py + 25, 25, 25);
            } 
            else if (this.attackType === 'gatling') {
                for(let i=0; i<8; i++) {
                    let r = Math.random() * 200;
                    ctx.fillStyle = "#f5c1a4";
                    ctx.fillRect(px + 30, py + (i * 8), r, 6);
                }
            }
        } else {
            // Braço em repouso (quando não está atacando)
            ctx.fillStyle = "#f5c1a4";
            ctx.fillRect(px + 40, py + 25, 10, 30);
        }
    },

    update() {
        this.y += this.dy;
        if (this.y + this.h + 25 < canvas.height - groundHeight) {
            this.dy += gravity;
        } else {
            this.dy = 0;
            this.y = canvas.height - groundHeight - this.h - 25;
            this.jumping = false;
        }

        if (this.attacking) {
            this.timer++;
            if (this.timer > 15) {
                this.attacking = false;
                this.timer = 0;
            }
        }
    },

    jump() {
        if (!this.jumping) {
            this.dy = -16;
            this.jumping = true;
        }
    },

    attack(type) {
        if (!this.attacking) {
            this.attackType = type;
            this.attacking = true;
            this.timer = 0;
        }
    }
};

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Chão (Gramado)
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

    player.update();
    player.draw();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
