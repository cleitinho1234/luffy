<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Câmera</title>
</head>
<body>
<h1>Teste de câmera</h1>
<button id="btn">Entrar / Continuar</button>
<video id="video" autoplay playsinline width="400"></video>

<script>
const btn = document.getElementById("btn");
const video = document.getElementById("video");

btn.addEventListener("click", async () => {
    console.log("Botão clicado"); // confirma o clique
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        console.log("Câmera ligada");
    } catch(e) {
        console.error("Erro: ", e);
        alert("Erro ao acessar a câmera: " + e.message);
    }
});
</script>
</body>
</html>
